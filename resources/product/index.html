<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Centers the product image vertically and horizontally */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dedicated fixed background div */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Pushes the background behind the image */
            
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .product-demo {
            /* Applies the rounded corners */
            border-radius: 10px; 
            
            /* Hardcoded width */
            width: 900px;
            
            /* Keeps it responsive on screens smaller than 600px */
            max-width: 90vw;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <img src="../demos/demo_v1.png" class="product-demo" alt="App Demo">

</body>
</html>
